name: CI

# Builds the app and runs the unit-test suite on every push and pull request, so
# regressions are caught automatically without cutting a release. Uploads the test
# report, lint report, and a debug APK as artifacts.
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-33" "build-tools;33.0.1"

      - name: Unit tests + build
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon testDebugUnitTest assembleDebug lintDebug

      - name: Upload unit-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Clock31-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore
